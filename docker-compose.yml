version: '3.9'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "${DB_PASSWORD}"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports: ["1433:1433"]
    volumes: [sql_data:/var/opt/mssql]
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "$$SA_PASSWORD" -Q "SELECT 1" || exit 1
      interval: 10s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports: ["5672:5672", "15672:15672"]
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USER:-guest}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASS:-guest}"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: src/OrderFlow.API/Dockerfile
    ports: ["5000:8080"]
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: >
        Server=db;Database=OrderFlowDb;User Id=sa;Password=${DB_PASSWORD};
        TrustServerCertificate=true;
      JwtSettings__SecretKey: "${JWT_SECRET_KEY}"
      Redis__ConnectionString: "redis:6379"
      RabbitMQ__Host: "rabbitmq"
      RabbitMQ__Username: "${RABBITMQ_USER:-guest}"
      RabbitMQ__Password: "${RABBITMQ_PASS:-guest}"
      Cors__AllowedOrigins__0: "http://localhost:3000"
    depends_on:
      db:       { condition: service_healthy }
      redis:    { condition: service_healthy }
      rabbitmq: { condition: service_healthy }

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: "http://localhost:5000"
    ports: ["3000:80"]
    depends_on: [api]

volumes:
  sql_data:
